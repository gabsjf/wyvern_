version: '3.8'

services:
  db:
    image: postgres:15
    container_name: wyvern_db
    environment:
      - POSTGRES_USER=wyvern
      - POSTGRES_PASSWORD=wyvern_super_secret
      - POSTGRES_DB=wyverndb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wyvern_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=wyverndb;Username=wyvern;Password=wyvern_super_secret;
      - Jwt__Key=ThisIsAVerySecretKeyForJwtAuthenticationWhichShouldBeLongEnoughAndChangedInProd
      - Jwt__Issuer=WyvernApi
      - Jwt__Audience=WyvernFront
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
