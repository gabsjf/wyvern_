<div class="container animate-fade-in">
  <div class="flex-between" style="margin-bottom: var(--spacing-xl);">
    <div>
      <h1 class="title-glow text-accent" style="margin-bottom: 0;">Campanhas</h1>
      <p style="color: var(--text-secondary); margin-top: 0.5rem;">Gerencie suas aventuras e mundos.</p>
    </div>
    <button class="btn-primary" routerLink="/campaigns/create">+ Nova Campanha</button>
  </div>

  <div class="grid-cards">
    @for (campaign of campaigns; track campaign.campanhaId) {
      <div class="glass-panel" style="padding: var(--spacing-lg); display: flex; flex-direction: column;">
        <h2 style="margin-bottom: var(--spacing-sm);">{{ campaign.nome }}</h2>
        <span style="color: var(--primary-color); font-weight: 500; font-size: 0.9rem; margin-bottom: var(--spacing-md);">{{ campaign.sistema }}</span>
        
        <div style="margin-top: auto; padding-top: var(--spacing-md); border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end;">
          <button class="btn-secondary" [routerLink]="['/campaigns', campaign.campanhaId]">Acessar</button>
        </div>
      </div>
    } @empty {
      <div class="glass-panel" style="padding: var(--spacing-xl); grid-column: 1 / -1; text-align: center;">
        <h3 style="color: var(--text-secondary);">Nenhuma campanha encontrada.</h3>
        <p style="margin-bottom: var(--spacing-md); color: var(--text-secondary);">Comece uma nova aventura criando a primeira campanha!</p>
      </div>
    }
  </div>
</div>
