<div class="container animate-fade-in" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
  <div class="glass-panel text-center" style="max-width: 500px; padding: 3rem;">
    <h2 class="title-glow text-accent mb-4">Portal de Invocação</h2>
    
    @if (status === 'loading') {
      <div class="spinner mb-3" style="margin: 0 auto; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    }
    @if (status === 'success') {
      <div style="font-size: 3rem; color: #00b894; margin-bottom: 1rem;">✓</div>
    }
    @if (status === 'error') {
      <div style="font-size: 3rem; color: #ff7675; margin-bottom: 1rem;">✕</div>
    }
    
    <p style="font-size: 1.2rem; color: var(--text-secondary);">{{ message }}</p>
    
    @if (status !== 'loading') {
      <button class="btn-primary mt-4" (click)="null" routerLink="/campaigns">Ver Minhas Campanhas</button>
    }
  </div>
</div>

<style>
  @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
