<nav class="sidebar glass-panel" [class.collapsed]="!isExpanded">
  <button type="button" class="toggle-btn" (click)="toggle()">
    <span *ngIf="isExpanded">◀</span>
    <span *ngIf="!isExpanded">▶</span>
  </button>
  <div class="sidebar-header" *ngIf="isExpanded">
    <h2 class="title-glow text-accent">Wyvern</h2>
  </div>
  <ul class="nav-links">
    <li><a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"><i class="bi bi-house-door icon"></i><span class="label" *ngIf="isExpanded">Dashboard</span></a></li>
    <li><a routerLink="/campaigns" routerLinkActive="active"><i class="bi bi-journal-bookmark icon"></i><span class="label" *ngIf="isExpanded">Campanhas</span></a></li>
    <li><a routerLink="/personagens" routerLinkActive="active"><i class="bi bi-person-lines-fill icon"></i><span class="label" *ngIf="isExpanded">Personagens</span></a></li>
    <li><a routerLink="/sessoes" routerLinkActive="active"><i class="bi bi-calendar-event icon"></i><span class="label" *ngIf="isExpanded">Sessões</span></a></li>
  </ul>
  <div class="sidebar-footer" *ngIf="isExpanded" style="margin-top: auto; padding: 1rem;">
    <button class="btn-secondary" style="width: 100%;" (click)="logout()">Sair</button>
  </div>
</nav>
